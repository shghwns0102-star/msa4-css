  <body>
    <form action="" method="get"> 
      <fieldset class="img"> 
        <legend><span>I want YOU!</span></legend>
        <div class="form"> <label for="name" class="star">이름</label>
          <input type="text" id="name" name="name" required>
          <br>
          <label for="age" class="star">나이</label>
          <input type="number" id="age" name="age" min="20" required>
          <br>
          <label for="gender" class="star">성별</label>
          <input type="radio" name="gender" id="men">
          <label for="men">남자</label>
          <input type="radio" name="gender" id="women">
          <label for="women">여자</label>
          <br>
          <label for="요청사항">요청사항</label>
          <textarea name="요청사항" id="요청사항" placeholder="요청 사항 입력"></textarea>
          <br>
        </div>
        <button name="button" type="submit">보내기</button>
      </fieldset>
    </form>
  </body>
  </html>
